api:
  openai_base_url: http://localhost:11434/v1   # Ollama's OpenAI-compatible endpoint
  # Default per the 13-run Colombia B2B benchmark (2026-07-11, manual rubric vs gold reference —
  # see README "Model choice"): gpt-oss is the only model in the "usable with verification" band
  # (best 7/10, high run-to-run variance but honest-empty on bad runs). mistral-nemo:12b passes the
  # delegate_tasks schema test 3/3 but benchmarks at a 2/10 ceiling with loud fabrication;
  # qwen3.6 researches well but fails synthesis at scale (1/10); hermes3:8b 0/3 on the schema.
  openai_model: deepdelve-gpt-oss
  # OpenAI-SDK retry budget for 429/5xx (exponential backoff, honors Retry-After). Hosted
  # endpoints (e.g. NVIDIA NIM's free tier) throttle far below what concurrent sub-agents
  # generate — a run died to a single unretried 429 before this existed.
  max_retries: 6
settings:
  enable_thinking: false
  temperature: 0.2
  # Optional: use a different (typically lighter/faster) model for the leaf specialist roles
  # (WebSearcher/AcademicSearcher/DocumentAnalyzer/DataAnalyzer) than api.openai_model, which stays
  # reserved for the Planner + writer/review roles (Builder/FindingsWriter/PeerReviewer) that need
  # multi-step self-correction — the bake-off's own repeated finding is that small local models are
  # reliable at single tool calls and unreliable at that coordination work. Falls back to
  # api.openai_model when unset (the default, single-model behavior, unchanged).
  # Real cost, not free: confirmed live this project's own dev GPU (16GB) does NOT keep two
  # different models loaded in VRAM simultaneously — a 12GB + 5GB model pair already exceeds the
  # budget, so every switch between the two models triggers a real reload (~5-23s measured). This
  # is paid once per delegate_tasks ROUND (the Planner boundary), not per individual specialist
  # tool call, so the tax scales with how many rounds a run needs, not how many sources it fetches.
  # Verify with a real timed A/B against your own hardware before assuming it's a net win.
  # specialist_model: deepdelve-qwen3-4b
  # specialist_base_url: escape hatch for a specialist model that isn't OpenAI-tool-calling
  # compatible on the SAME endpoint as api.openai_base_url (e.g. a local translation proxy in
  # front of a model with its own native tool-call format). Only meaningful together with
  # specialist_model above; falls back to api.openai_base_url when unset.
  # specialist_base_url: http://localhost:8800/v1
  concurrency:
    # Must not exceed your backend's REAL concurrent-request serving capacity, not just a number
    # that "sounds reasonable." Confirmed live 2026-07-14: a single-GPU Ollama instance serving a
    # 20B model with OLLAMA_NUM_PARALLEL=1 (the default for VRAM-constrained local setups) can
    # only ever generate for ONE of these concurrent dispatches at a time — the others sit queued
    # at the HTTP layer with zero streamed tokens, silently burning their own
    # sub_agent_timeout_minutes deadline (which starts once this semaphore is acquired, not once
    # Ollama actually starts serving the request) before ever producing real output. Root-caused
    # via a run where every 'background' sub-agent dispatch failed with "stream produced no
    # update before the deadline" despite the model being healthy. Set this to your backend's
    # actual OLLAMA_NUM_PARALLEL (or hosted-endpoint concurrency limit), not higher.
    max_concurrent_tasks: 3
  # Structural fix for the #1 unresolved reliability issue found via extensive live testing
  # (README "Known limitation" / ROADMAP.md): across every model tried, the Searcher would
  # reliably stop at search snippets and never call fetch_url_to_workspace, then fabricate
  # specifics the snippets didn't contain. web_search now auto-fetches the full content of its
  # top N results itself — there is no snippet-only path left to take. Costs one
  # fetch_url_to_workspace quota unit per auto-fetch (skipped gracefully if that quota is
  # exhausted). Set to 0 to disable and restore the old search-then-optionally-fetch behavior.
  web_search:
    auto_fetch_top: 1
    # Outer timeout on a single search call (also reused by the pre-run search-health probe in
    # engine/tui.py) — confirmed live 2026-07-13 (a run stalled indefinitely) and root-caused
    # against two real GitHub issues (HKUDS/nanobot#2804, microsoft/amplifier#219): ddgs's
    # underlying `primp` Rust HTTP client can block in a way a plain asyncio.to_thread background
    # thread never returns from — and never returns to Python control at all, which would leave
    # the process unable to exit cleanly even after the model gets its error back. Enforced via
    # tools/web.py::_run_with_daemon_timeout (a real daemon thread, not just an async cancel) —
    # see its docstring for why a bare asyncio.wait_for isn't enough on its own.
    timeout_seconds: 20
  # "light" (default): behavior unchanged. "heavy": web_search searches deeper (max_results >= 8)
  # and auto-fetches more of the top results (>= 3) per call — a larger verified data pool per
  # search, for queries where thoroughness matters more than tool-call/token economy. Costs more
  # fetch_url_to_workspace quota per call; raise that quota if you enable this.
  search_mode: light
  # "standard" (default): free-format report shape (short answer or generic structured sections,
  # Planner's own judgment) with the default `- **[Title](URL)**` inline citation format.
  # "academic": a literature-review paper shape (Abstract, Introduction, thematic sections,
  # Cross-Cutting Synthesis, Quantitative Benchmarking, Challenges & Future Directions,
  # Conclusion, References) with `(Author, Year)` in-text citations resolved against a numbered
  # References list — see src/prompts.py's ACADEMIC_REPORT_STYLE_INSTRUCTIONS /
  # ACADEMIC_CITATION_FORMAT_INSTRUCTIONS and utils/grounding.py's parse_academic_references.
  # "answer": a 1-3 sentence direct answer instead of a full report, for simple factual queries —
  # ROADMAP.md candidate from dzhng/deep-research's writeFinalAnswer. Cites inline as
  # `(Source: [Title](URL))` on the answer's own sentence — no separate References section. Does
  # NOT relax any grounding check, only the report's SHAPE (see ANSWER_REPORT_STYLE_INSTRUCTIONS).
  # Orthogonal to --depth (that only changes tool budgets, this changes report SHAPE); set via
  # --style on the CLI or this key directly.
  report_style: standard
  # Search engine(s) for web_search. "auto" lets the ddgs metasearcher rotate/fall back across
  # its 10+ engines (google, bing, brave, yahoo, startpage, mojeek, duckduckgo, ...) — a single
  # pinned provider is a single point of failure: DDG throttling after a search-heavy day made
  # whole runs fail in ways that looked like model fabrication (see search_health in
  # _run_state.json). A comma list pins specific engines in order, e.g. "google,brave,duckduckgo".
  search_backend: auto
  fetch:
    # Headless-browser (Playwright) retry when a plain HTTP fetch comes back looking like a
    # bot-wall stub — Akamai/Cloudflare JS challenges, browser-version-sniffing blocks. Confirmed
    # live 2026-07-14: real, citable papers on Springer, ScienceDirect, and MDPI were all getting
    # marked as fake/stub sources because the plain fetch never received real content (a stripped
    # shell, an "unsupported browser" block page, and a JS interstitial respectively) — see
    # tools/web.py::_fetch_raw and ROADMAP.md. No-op with zero latency cost if Playwright isn't
    # installed (`pip install deepdelve[browser] && playwright install chromium`).
    headless_fallback: true
  quotas:
    # Quotas are GLOBAL — shared cumulatively across the Planner and every dispatched specialist
    # (WebSearcher, AcademicSearcher, DocumentAnalyzer, DataAnalyzer). Each key becomes a prompt
    # format variable {key_quota}.
    delegate_tasks: 15
    web_search: 15
    fetch_url_to_workspace: 15
    search_verified_findings: 10
    write_workspace_file: 10
    list_workspace_files: 10
    write_todos: 10
    read_todos: 10
    think_tool: 30
    read_workspace_file:
      limit: 30
      rules:
        max_lines: 300
    grep_workspace_file:
      limit: 30
      rules:
        max_matches: 10
  # How much extra headroom a completion-check retry gets on top of whatever's left in the shared
  # pool, per tool. Fixes the old project's bug where all 3 retries drew from the same
  # already-exhausted budget as the failed first attempt (see README "Completion Checks").
  retry_quota_topup:
    delegate_tasks: 3
    web_search: 3
    fetch_url_to_workspace: 3
  # How many completion-check attempts a run gets before giving up with an unresolved issue
  # (missing_artifact / not_grounded / etc.) instead of continuing to retry. The old fixed default
  # of 3 could cut a run off with real sources already sitting in findings.md, well before any
  # real hardware constraint — raise this if you have compute/time to spare and would rather the
  # agent keep revising than stop early. Each extra attempt costs wall-clock time and the
  # retry_quota_topup allowance above, not memory — this is not a resource-limited setting.
  max_completion_check_attempts: 3
  # ROADMAP Phase 5 ("Coverage accounting / ResearchMap"): distinct from every grounding_check
  # below, which all verify content that ALREADY EXISTS is properly cited -- this instead asks
  # whether the Planner's own top-level delegated research plan actually paid off. A report can be
  # perfectly grounded (every citation traces to a real fetch) yet still be thin because most of
  # the Planner's own delegated angles came back with nothing usable and got silently dropped.
  # Built entirely from already-reliable, model-independent structural data (utils/run_state.py's
  # RunState.coverage(): per-task fetch attribution + delegation depth, not a new Planner-authored
  # schema). Conservative: fires only when a MAJORITY of top-level tasks came back with no real
  # source AND there are enough of them for that to mean something -- a single-task query (the
  # common case for a simple factual lookup) that succeeded is never affected by this at all.
  coverage_check:
    enabled: true
    threshold: 0.5    # fire when covered/total top-level tasks falls below this
    min_tasks: 2       # never fire with fewer top-level tasks than this -- not enough signal
  # Engine-driven iterative deepening (2026-07-19, ROADMAP item 10, dzhng/deep-research pattern):
  # when a thin_coverage retry fires AND a Searcher's own real "FOLLOW-UP DIRECTIONS:" section
  # named a real lead, the ENGINE dispatches those directions directly as new tasks (geometric
  # narrowing, ceil(prior_breadth/2)) instead of nudging the Planner and hoping it acts on a lead
  # buried in its own conversation -- local models demonstrably under-loop on this (ROADMAP: run
  # 15 found 1 niche of 4-6 required). Bounded per run by this many rounds; 0 disables it entirely
  # (falls back to the classic Planner nudge unchanged). --depth overrides this: quick=0, deep=2 --
  # see engine/tui.py's _DEPTH_PRESETS.
  max_deepening_rounds: 1
  # Wall-clock budget in minutes for headless runs (0 = no limit; TUI ignores this — a user at
  # the keyboard can /stop). Not a hard kill: on expiry the current turn is cut short and the
  # completion check jumps straight to its final verdict, so labeling and report salvage still
  # run and the run ends with an explicit outcome. A qwen3.6 run once ran 64 minutes unbounded.
  max_run_minutes: 45
  # Wall-clock budget in minutes for EACH sub-agent dispatch (Searcher/Analyzer/Builder/
  # FindingsWriter/PeerReviewer) — independent of max_run_minutes above, deliberately: that's a
  # whole-RUN ceiling shared by every turn, so a single runaway sub-agent call racing against it
  # (both anchored to roughly the same run-start clock) gets cancelled by whichever fires first,
  # not necessarily this one — which means it provides no protection against ONE slow call among
  # MANY quick ones early in a long run with plenty of budget still left. This is a fresh,
  # independent per-dispatch timer instead (0 = no limit). Confirmed live 2026-07-14: a single
  # sub-agent turn continuously, validly decoded 19,908+ tokens (steady ~33 tok/s per
  # journalctl -u ollama's own print_timing log — not stuck, just an unusually long generation)
  # before the openai SDK's own blunt ~600s default connection timeout killed it and threw a raw
  # exception, which then triggered an ungraceful retry that hit the same pattern again. Not a
  # hard kill, same policy as max_run_minutes: the turn is cut short gracefully (whatever text was
  # generated so far is kept, with a clear marker), not lost to a raw connection error.
  sub_agent_timeout_minutes: 10
  # Per-agent-stream context budget in CHARACTERS (0 = off). Local models run at num_ctx ~16384
  # tokens (~65K chars); on overflow Ollama silently truncates from the TOP — eating the system
  # prompt mid-run, which looks exactly like model collapse. When an agent's streamed content
  # (text + tool args + tool results) exceeds this, its turn is cut short: sub-agents return their
  # findings immediately; the headless Planner's turn just ends (it stops delegating), and the
  # completion-check system then dispatches FindingsWriter/Builder to write findings.md + the
  # report from whatever real research was actually delegated before the cutoff — never the
  # Planner itself, which has no write_workspace_file tool (see README "Context management").
  # Idea from Tongyi DeepResearch's react_agent.py (see README References). Applies to sub-agent
  # tasks everywhere and to the Planner in headless mode; the TUI Planner is exempt (a user can
  # /stop), same policy as max_run_minutes. 50000 ≈ safe margin under a 16K-token num_ctx.
  context_budget_chars: 50000
  # When true, the Planner's write_todos call requires human approval before it commits (TUI mode
  # shows the plan content in an interactive approve/deny widget; headless/--prompt mode falls back
  # to the existing --auto-approve flag). Lets you review/reject the research plan before quota is
  # spent on delegate_tasks, reusing the same tool-approval machinery as settings.permissions.
  human_in_the_loop: false
  # TUI only: before the first research run of a conversation, one tool-less intake call either
  # replies CLEAR or asks up to 3 scoping questions (subject boundaries, geography, timeframe,
  # deliverable focus) — a mis-scoped run costs its full 15-60 minutes, the intake call costs
  # seconds. Fail-open by design: an error, empty reply, or rambling reply from the intake model
  # falls straight through to research. Headless runs (--prompt/--resume-run) never clarify.
  clarify_before_research: true
  # Per-tool approval gate (engine/orchestrator.py::apply_tool_permissions). remove_workspace_file's
  # own docstring calls it "a destructive action that mandates human oversight" — that claim is only
  # actually true if it's listed here. No agent currently has this tool wired in (see app.py), but
  # it's in the shared WORKSPACE_TOOLS/tools/__init__.py export list for future use, so the default
  # config gates it now rather than leaving a documented-but-unenforced safety guarantee.
  permissions:
    remove_workspace_file: require_approval
  enable_conversational_memory: true
  enable_session_persistence: true
  workspace:
    type: disk
    dir: "./research_output"
    session_isolation: true
    required_artifact: "final_report.md"
  # Real grounding check: cross-references every URL cited in final_report.md against the URLs the
  # engine actually saw fetch_url_to_workspace fetch this run (logged centrally, not model-reported).
  grounding_check:
    enabled: true
    live_http_verify: true       # also HEAD-request each cited URL to confirm it still resolves
    live_http_timeout: 5
    # Second, deeper layer beyond URL-presence: for a citation that WAS actually fetched, does its
    # content share any checkable fact (number, version, proper noun) with what the report claims?
    # Catches "cited a real fetched source without actually reading it" — inspired by CYC2002tommy's
    # SKILL.md claim-grounding phase, scoped to a cheap deterministic check rather than another LLM
    # call (see utils/grounding.py::claim_grounding_problem). Deliberately conservative (zero-overlap
    # only) to keep false positives rare — set false to disable if it proves too noisy in practice.
    content_level_check: true
    # Third, deepest layer beyond URL-presence and term-overlap: for a claim line whose citation
    # WAS fetched and DOES share a checkable term with the source (so content_level_check passed),
    # does a small NLI cross-encoder actually judge the claim as entailed by the source's most
    # relevant paragraph — not just coincidentally overlapping? Catches a claim wearing a citation
    # to a real, fetched, topically-similar source whose specific claim text isn't actually
    # supported (e.g. a wrong paper title/attribute swap that still shares generic terms).
    # Runs a small CPU-only NLI model (sentence-transformers cross-encoder/nli-deberta-v3-small,
    # ~550MB checkpoint downloaded from HuggingFace on first use, ~2.5GB additional disk for the
    # torch/transformers/sentence-transformers dependency stack itself — see pyproject.toml) —
    # explicit device="cpu", never competes for GPU/VRAM already budgeted for the main research
    # LLM. Confirmed live 2026-07-12 (NVIDIA NIM gpt-oss-20b benchmark): term-overlap alone passed
    # a citation whose claim sentence directly contradicted its cited source's real title
    # ("Dual Causal Network" quoted vs. the source's actual "Dual Correlation Network"). Fails
    # open (skips silently, never crashes or blocks a run) if the model/dependency isn't
    # available — an offline/air-gapped run is never blocked by this. Set false to disable if it
    # proves noisy, or if sentence-transformers isn't installed.
    nli_verify: true
    # Fourth layer, beyond term-overlap AND entailment: for a claim that passed BOTH of those (the
    # cited source shares terms and doesn't contradict the claim), is the source actually about
    # the SAME SUBJECT, or just superficially similar? Catches acronym/homograph collisions term-
    # overlap and entailment both miss by construction — e.g. a claim about the Grasshopper
    # Optimization Algorithm ("GOA") citing a source that's actually about the Indian state of Goa
    # ("Goa"): 'GOA'/'Goa' term-overlap passes, and an EV-policy sentence about Goa doesn't
    # CONTRADICT an algorithm claim (it's just unrelated), so NLI never flags it either. A
    # cross-encoder reranker (BAAI/bge-reranker-v2-m3, sentence-transformers, same soft dependency
    # as nli_verify above -- NOT an additional pip package, just a second checkpoint through the
    # same already-installed library, ~1.1GB additional download on first use) scores each
    # (claim, source-passage) pair for topical relevance directly. Conservative threshold (only a
    # CLEARLY unrelated pair, near 0, fires -- see topical_relevance_threshold below). Fails open
    # if the model/dependency isn't available. Set false to disable if it proves noisy, or if
    # sentence-transformers isn't installed.
    topical_relevance_check: true
    topical_relevance_threshold: 0.1   # 0-1 relevance score below which a pair is flagged (lower = stricter gate, fewer false positives)
    # Catches a claim attributed to something that isn't a URL at all — a bare "(DANE, 2020)"
    # parenthetical or a "Source: <prose>" line — which extract_cited_urls never sees since it only
    # recognizes https?:// patterns. Confirmed live: a report can have real, fetched-and-verified
    # URL citations for most claims while smuggling in an unverifiable non-URL attribution for
    # others (see utils/grounding.py::find_non_url_citations). Set false to disable if a legitimate
    # report style trips it too often.
    non_url_citation_check: true
    # A regulation identifier ("Ley 1906 de 2021", "Directive 2014/55/EU") cited to a fetched
    # source whose content never mentions that regulation's number — a misattributed or invented
    # law number wearing a real citation. Confirmed live (run 12): the report's flagship niche
    # hung on a law number that appears nowhere in its own cited source; the URL-presence gate
    # passed (real fetch) and the zero-overlap content check passed (shared generic terms), so
    # only this check catches it (see utils/grounding.py::find_unsupported_regulation_ids).
    regulation_id_check: true
    # A cited URL whose fetch returned only a soft-404/paywall shell (HTTP 200 but no real
    # article content — detected at fetch time by tools/web.py::_stub_reason and recorded as
    # stub in _run_state.json's fetched_urls). Confirmed live (run 14): a model-invented URL
    # answered 200 with 5KB of subscription chrome, counted as a real fetch, and passed the
    # URL-presence gate. With this on, citing a stub-only URL fails the completion check, and
    # stub content can't satisfy the claim/regulation checks either.
    stub_detection: true
    # Citation-format enforcement: >=3 figure-bearing claim lines with no citation on the line
    # fail the check even when every URL in the report is real. The line-scoped checks above all
    # assume claim+citation on one line; a model that writes a table of figures plus a detached
    # "### Source URLs" list (run 14's exact shape) passes them all vacuously — nothing ties any
    # figure to any source (see utils/grounding.py::find_uncited_claim_lines).
    citation_format_check: true
    # Runs the same URL-presence + content-level check on each Searcher specialist's summary
    # before it reaches the Planner, not just on the final report — catches a hallucinated
    # citation at the source instead of letting it poison findings.md first (see
    # engine/orchestrator.py::_run_single_task). Set false to restore final-report-only checking.
    verify_specialist_output: true
    # For each Searcher-tier task, checks whether anything it actually fetched even mentions the
    # scope entity (e.g. a country name) required by the task's own delegation instructions —
    # confirmed live that instruction wording alone ("...in Colombia") doesn't stop search+fetch
    # from surfacing an off-topic or wrong-country source anyway (see engine/orchestrator.py::
    # _extract_scope_entities). A soft warning appended to the specialist's summary, not a hard
    # block — the Planner still decides what to do with it.
    verify_scope_relevance: true
    # Wholesale-fabrication gate on findings.md (Pass 1), which was previously never checked at
    # all — only final_report.md was. Flags a findings.md with zero source URLs, or where not one
    # cited URL matches anything actually fetched this run (a Planner that abandons delegation and
    # writes Pass 1 from memory — confirmed live). Laxer than the final-report check on purpose:
    # Pass-1 notes may legitimately mention extra search-snippet URLs that were never fetched.
    check_findings: true
  # Non-generative routing classifier for delegate_tasks's agent_id (RESEARCH.md §6, ROADMAP.md
  # "Planned", 2026-07-20) — a frozen sentence-embedding model + logistic regression trained
  # offline (finetune/train_agent_routing_classifier.py) on real historical (instructions,
  # agent_id) pairs from this project's own session logs. Motivation: ~4.9% of real historical
  # delegate_tasks calls used a syntactically well-formed but hallucinated agent_id ("searcher",
  # "PeerReviewer", invented role names) — a routing decision over a fixed, tiny label set that a
  # generative model keeps getting wrong in a way more fine-tuning data can't structurally fix
  # (two independent papers found this failure persists even after a 6,000-sample SFT run, since
  # it happens downstream of anything fine-tuning touches — see RESEARCH.md §1). Default OFF: new,
  # unvalidated against live traffic, and requires running the training scripts first to produce
  # finetune/artifacts/agent_routing_classifier.joblib — an install that skips this entirely runs
  # unaffected (see utils/agent_routing.py::predict_agent_id, fails open, same philosophy as
  # grounding_check above).
  agent_routing_classifier:
    enabled: false
    # Decided policy (not advisory-only, not silent override): only intervenes when the declared
    # agent_id isn't a real known role, OR the classifier disagrees strongly (confidence above
    # min_confidence on a DIFFERENT class than declared) — in either case the task is added to
    # delegate_tasks's existing error-accumulation path, forcing a Planner retry with an explicit
    # reason, rather than silently substituting a value the Planner never chose. This is the only
    # mode implemented; the field exists for a future advisory/override mode, not as a live toggle.
    mode: "reject"
    # Below this confidence, the classifier abstains (same "none apply" pattern ATLAS/AdaMAST uses,
    # RESEARCH.md §1) and the Planner's own agent_id is used untouched, even if it disagrees with
    # the classifier's best (low-confidence) guess.
    min_confidence: 0.6
    # Override for testing a differently-trained artifact without touching the default path
    # (finetune/artifacts/agent_routing_classifier.joblib).
    artifact_path: null
  # Persistent cross-run cache of VERIFIED findings (ROADMAP.md "Strategic options" item 5,
  # RESEARCH.md §8, 2026-07-20) — real semantic retrieval via frozen sentence-embeddings
  # (all-MiniLM-L6-v2, already a proven dependency), exposed to WebSearcher/AcademicSearcher as the
  # search_verified_findings tool, so a topic already researched and verified in a past run doesn't
  # need to be re-fetched/re-analyzed from scratch. Deliberately NOT the same design as the
  # deleted knowledge_cache/experience_cache (commit 929b987, 2026-07-11), which stored whole final
  # ANSWERS keyed by raw query text and was confirmed live to contaminate model bake-off
  # comparisons (a later model's trial would hit an earlier model's cached answer and reproduce it
  # near-verbatim). This cache stores one verified ATOMIC FINDING (source_url + summary) per topic
  # — a cache hit still requires the Searcher to cite and incorporate it itself, exactly like a
  # fresh web_search result, which is what makes it safe across different models. A cache entry is
  # only ever written after a finding passes the SAME grounding+relevance check every live finding
  # already goes through (see engine/orchestrator.py::_run_single_task's write hook) — never less
  # verified than a same-run finding. Default OFF: new, unvalidated against live traffic.
  rag_cache:
    enabled: false
    path: ~/.{APP_NAME}/rag_cache.json
    # A cached finding older than this is excluded from search_verified_findings results — most
    # research topics have a real staleness horizon (a "current version" fact goes stale fast).
    # Same default as the deleted knowledge_cache used, kept for continuity, actually enforced this
    # time (utils/rag_cache.py::lookup filters on this before returning anything).
    max_age_days: 7
    # Cosine-similarity threshold (0-1) a cached finding's task_context must clear against the new
    # query to be considered a match. 0.75 is a conservative starting point (favors precision over
    # recall) — a query with no match above this returns nothing rather than a loosely-related hit.
    min_similarity: 0.75
    # Maximum number of matches search_verified_findings returns per call.
    top_k: 3
  # External MCP servers, scoped to specific sub-agents by name (omit 'agents' to expose to all).
  # Connected only for the lifetime of each delegated task (see
  # engine/orchestrator.py::_run_single_task). Empty by default — none of this runs unless you add
  # an entry AND install the corresponding server yourself. Two concretely researched options
  # (not guessed) rather than building bespoke API clients from scratch:
  #   - Semantic Scholar MCP for AcademicSearcher (200M+ papers, citations, authors — no API key
  #     needed for the public tier): https://github.com/xiuyechen/semantic-scholar-mcp
  #     mcp_servers:
  #       - name: semantic-scholar
  #         transport: stdio
  #         command: uvx
  #         args: ["semantic-scholar-mcp"]
  #         agents: ["AcademicSearcher"]
  #   - Brave Search MCP for WebSearcher (a real search index instead of DDGS scraping — needs a
  #     free-tier API key from https://brave.com/search/api/). Uses Brave's own maintained
  #     @brave/brave-search-mcp-server (migrated 2026-07-12 from the reference implementation
  #     @modelcontextprotocol/server-brave-search, which is npm-deprecated):
  #     mcp_servers:
  #       - name: brave-search
